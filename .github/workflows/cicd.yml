name: Deploy AeroStay

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: rishav256/aerostay-api:latest

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: rishav256/aerostay-client:latest
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull rishav256/aerostay-api:latest
            docker pull rishav256/aerostay-client:latest

            docker stop aerostay-api || true
            docker stop aerostay-client || true
            docker rm aerostay-api || true
            docker rm aerostay-client || true

            docker run -d \
              --name aerostay-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRY="${{ secrets.JWT_EXPIRY }}" \
              -e COOKIE_TIME="${{ secrets.COOKIE_TIME }}" \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e CLOUDINARY_NAME="${{ secrets.CLOUDINARY_NAME }}" \
              -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              -e CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
              -e CLIENT_URL="${{ secrets.CLIENT_URL }}" \
              -e PORT=8000 \
              rishav256/aerostay-api:latest

            docker run -d \
              --name aerostay-client \
              --restart unless-stopped \
              -p 3000:80 \
              rishav256/aerostay-client:latest
